name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci
      - run: npm test
      - run: npm run lint
      - run: npm run build

  release:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install npm for trusted publishing
        run: npm install -g npm@11.5.1

      - name: Configure npm auth for semantic-release
        env:
          NPM_SECRET: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail

          if [ -n "${NODE_AUTH_TOKEN:-}" ] && npm whoami >/dev/null 2>&1; then
            echo "NPM_TOKEN=${NODE_AUTH_TOKEN}" >> "$GITHUB_ENV"
            echo "Auth: OIDC (Trusted Publisher via setup-node)"
          elif [ -n "${NPM_SECRET:-}" ]; then
            echo "//registry.npmjs.org/:_authToken=${NPM_SECRET}" >> "${HOME}/.npmrc"
            echo "NPM_TOKEN=${NPM_SECRET}" >> "$GITHUB_ENV"
            npm whoami
            echo "Auth: NPM_TOKEN secret (must be Automation type)"
          else
            echo "::error::npm auth missing. Either configure Trusted Publisher for workflow ci.yml on https://www.npmjs.com/package/@53able/hikari or set NPM_TOKEN to an Automation token."
            exit 1
          fi

          if ! OUT=$(npm publish --dry-run --tag beta 2>&1); then
            echo "$OUT"
            if echo "$OUT" | grep -qE 'EOTP|one-time password'; then
              echo "::error::Publish blocked by 2FA (EOTP). Replace NPM_TOKEN with an Automation token: https://www.npmjs.com/settings/~tokens → Automation → gh secret set NPM_TOKEN --repo 53able/hikari. Or remove the secret and use Trusted Publisher only."
              exit 1
            fi
            exit 1
          fi
          echo "$OUT"

      - run: npm ci

      - name: Publish version if git tag exists but npm does not
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./package.json').version")
          if ! git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            exit 0
          fi
          if npm view "@53able/hikari@${VERSION}" version >/dev/null 2>&1; then
            echo "@53able/hikari@${VERSION} already on npm"
            exit 0
          fi
          npm run build
          npm publish --tag beta

      - name: Release to npm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
